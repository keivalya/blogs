<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Keivalya Blogs Logo</title>
  <desc id="desc">A simple circular symbol inspired by connected systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <circle cx="110" cy="110" r="104" fill="url(#bg)"/>
  <circle cx="110" cy="110" r="70" fill="none" stroke="#e0f2fe" stroke-width="11" opacity="0.95"/>

  <g fill="#f0f9ff">
    <circle cx="110" cy="36" r="9"/>
    <circle cx="184" cy="110" r="9"/>
    <circle cx="110" cy="184" r="9"/>
    <circle cx="36" cy="110" r="9"/>
  </g>

  <g stroke="#bae6fd" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="110" y1="49" x2="110" y2="78"/>
    <line x1="171" y1="110" x2="142" y2="110"/>
    <line x1="110" y1="171" x2="110" y2="142"/>
    <line x1="49" y1="110" x2="78" y2="110"/>
  </g>

  <circle cx="110" cy="110" r="16" fill="#f8fafc"/>
</svg>
